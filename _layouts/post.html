---
layout: default
---

<article>
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-meta">
      <span>{{ page.date | date: "%d/%m/%y" }}</span>
      {% if page.read_time %}
      <span>{{ page.read_time }} min read</span>
      {% endif %}
    </div>
  </header>

  <div class="post-content">
    {% if page.image %}
    <div class="post-image-wrap">
      <img src="{{ page.image }}" alt="{{ page.image_alt | default: '' }}" loading="lazy" />
    </div>
    {% if page.image_alt %}
    <p class="post-image-caption">{{ page.image_alt }}</p>
    {% endif %}
    {% endif %}

    {{ content }}
  </div>
</article>

<a class="back-link" href="{{ '/' | relative_url }}">← back</a>
